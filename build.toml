# CRUMPET
# Author: Chris von Csefalvay
# Licence: MIT
# Hugging Face kernel: https://hf.co/chrisvoncsefalvay/crumpet

[general]
name = "crumpet"
version = 1
license = "mit"
backends = ["cuda"]

[general.hub]
repo-id = "chrisvoncsefalvay/crumpet"

[torch]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
    "torch-ext/registration_select.h",
    "torch-ext/local_registration.h",
]
pyext = ["py"]

[kernel.crumpet_shift_partition_3d]
backend = "cuda"
depends = ["torch"]
src = [
    "cuda/shift_partition_3d.cu",
    "cuda/crumpet_common.cuh",
    "torch-ext/torch_binding.h",
]
include = ["cuda", "torch-ext"]
cuda-capabilities = ["8.0", "8.6", "9.0", "12.0"]
cuda-flags = ["-O3", "-lineinfo", "-Xptxas=-warn-spills"]

[kernel.crumpet_unshift_unpartition_3d]
backend = "cuda"
depends = ["torch"]
src = [
    "cuda/unshift_unpartition_3d.cu",
    "cuda/crumpet_common.cuh",
    "torch-ext/torch_binding.h",
]
include = ["cuda", "torch-ext"]
cuda-capabilities = ["8.0", "8.6", "9.0", "12.0"]
cuda-flags = ["-O3", "-lineinfo", "-Xptxas=-warn-spills"]

[kernel.crumpet_attn_mask_3d]
backend = "cuda"
depends = ["torch"]
src = [
    "cuda/attn_mask_3d.cu",
    "cuda/crumpet_common.cuh",
    "torch-ext/torch_binding.h",
]
include = ["cuda", "torch-ext"]
cuda-capabilities = ["8.0", "8.6", "9.0", "12.0"]
cuda-flags = ["-O3", "-lineinfo", "-Xptxas=-warn-spills"]
